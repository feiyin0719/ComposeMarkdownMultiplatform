name: Publish to Maven Central

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Decode GPG key
        run: echo "${{ secrets.GPG_SIGNING_KEY }}" | base64 --decode > /tmp/secring.asc

      - name: Publish markdown-multiplatform
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/secring.asc)
          ./gradlew :markdown-multiplatform:publishAllPublicationsToMavenCentralRepository \
            -PVERSION_NAME=${{ steps.version.outputs.version }} \
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Publish markdown-multiplatform-table
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/secring.asc)
          ./gradlew :markdown-multiplatform-table:publishAllPublicationsToMavenCentralRepository \
            -PVERSION_NAME=${{ steps.version.outputs.version }} \
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Publish markdown-multiplatform-image
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/secring.asc)
          ./gradlew :markdown-multiplatform-image:publishAllPublicationsToMavenCentralRepository \
            -PVERSION_NAME=${{ steps.version.outputs.version }} \
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Publish markdown-multiplatform-html
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/secring.asc)
          ./gradlew :markdown-multiplatform-html:publishAllPublicationsToMavenCentralRepository \
            -PVERSION_NAME=${{ steps.version.outputs.version }} \
            --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/logs/
            ${{ runner.temp }}/.gradle-actions/
